version: '3.8'

services:
  worker-scanner:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: vulnanalytics-worker-test
    privileged: true 
    environment:
      - RABBITMQ_HOST=host.docker.internal
    command: ["python", "app/worker_consumer.py"]
    volumes:
      - ./app:/usr/src/worker/app
