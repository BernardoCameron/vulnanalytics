version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: vulnanalytics-rabbitmq
    ports:
        - "5672:5672" # Puerto principal AMQP
        - "15672:15672" # Puerto del panel web Management UI
    environment:
        RABBITMQ_DEFAULT_USER: admin
        RABBITMQ_DEFAULT_PASS: admin123
    volumes:
        - rabbitmq_data:/var/lib/rabbitmq/
    restart: unless-stopped

volumes:
  rabbitmq_data:
